<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Storyboard Preview</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --panel: #ffffff;
      --ink: #1f1f1f;
      --muted: #666;
      --line: #ddd7cc;
    }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f7f4ee);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .sub { margin: 0; color: var(--muted); }
    main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #ece8de;
      display: block;
    }
    .content { padding: 12px; }
    .id { font-weight: 700; margin: 0 0 6px; }
    .meta { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      background: #fbfaf7;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      max-height: 240px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Storyboard Scene Preview</h1>
    <p class="sub">Replace `SCENES` in the inline script with your generated scene data.</p>
  </header>
  <main id="grid"></main>

  <script>
    const SCENES = [
      {
        scene_id: "SCENE_01",
        duration_seconds: 8,
        image: "../scenes/scene_01.png",
        prompt: "Example prompt for scene 01",
        continuity: "Initial scene"
      }
    ];

    const grid = document.getElementById("grid");
    SCENES.forEach(scene => {
      const card = document.createElement("article");
      card.innerHTML = `
        <img src="${scene.image}" alt="${scene.scene_id}" />
        <div class="content">
          <p class="id">${scene.scene_id}</p>
          <p class="meta">Duration: ${scene.duration_seconds}s</p>
          <pre>${scene.prompt}\n\nContinuity: ${scene.continuity}</pre>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
