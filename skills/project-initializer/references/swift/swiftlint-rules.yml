# SwiftLint configuration file
# To prevent hardcoded text directly in SwiftUI Views

disabled_rules:
  # Customize standard rules if desired
  - line_length

opt_in_rules:
  - empty_count
  - force_unwrapping

custom_rules:
  no_hardcoded_strings_in_views:
    name: "No Hardcoded Strings in Views"
    regex: 'Text\(\s*"([^"]+)"\s*\)'
    message: "Avoid using hardcoded string literals inside SwiftUI Text views. Route strings via localization keys or Localizable.strings instead."
    severity: warning
    match_kinds:
      - string

  no_hardcoded_label_strings:
    name: "No Hardcoded Strings in SwiftUI Label"
    regex: 'Label\(\s*"([^"]+)"\s*,\s*systemImage:\s*"([^"]+)"\s*\)'
    message: "Avoid using hardcoded string literals inside SwiftUI Label views. Route strings via localization keys or Localizable.strings instead."
    severity: warning
    match_kinds:
      - string

  no_raw_string_arguments_in_views:
    name: "No Hardcoded Raw Strings in UI Elements"
    regex: '(?:Button|NavigationTitle|Alert)\(\s*"([^"]+)"'
    message: "Do not pass raw string literals directly to SwiftUI/UIKit components. Always localize."
    severity: warning
    match_kinds:
      - string
